# Nightly full-matrix tests for the Node client.
# Thin wrapper around node.yml that isolates scheduling so per-language
# full-matrix runs can be staggered and failures do not cascade across
# languages. Flaky-test isolation work: see #4629.
name: FMT Node

permissions:
    contents: read
    actions: write

on:
    # Nightly at 03:30 UTC (8:30 PM PDT).
    schedule:
        - cron: "30 3 * * *"
    workflow_dispatch:
        inputs:
            use-self-hosted-linux:
                description: "Use self-hosted runners for Linux x64"
                type: boolean
                default: false

concurrency:
    group: fmt-node-${{ github.ref }}
    cancel-in-progress: true

jobs:
    run-fmt-node:
        if: github.repository_owner == 'valkey-io'
        uses: ./.github/workflows/node.yml
        with:
            run-with-macos: use-self-hosted
            use-self-hosted-linux: ${{ inputs.use-self-hosted-linux || false }}
        name: FMT - Node
        secrets: inherit
