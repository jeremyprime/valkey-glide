plugins {
    id 'java'
    id 'com.github.johnrengelman.shadow' version '8.1.1'
}

java { toolchain { languageVersion = JavaLanguageVersion.of(11) } }

repositories {
    mavenLocal()
    mavenCentral()
}

dependencies {
    implementation 'io.valkey:valkey-glide:255.255.255:linux-x86_64'
}

shadowJar {
    archiveFileName = 'circuit-breaker-test-1.0-SNAPSHOT.jar'
    manifest { attributes 'Main-Class': 'com.company.glide.circuitbreaker.CircuitBreakerTest' }
}
